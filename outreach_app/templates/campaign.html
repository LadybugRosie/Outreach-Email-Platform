{% extends "base.html" %}
{% block content %}
<section class="card">
  <div class="split">
    <h1>Batch {{ campaign_id }}</h1>
    <form method="post" action="{{ url_for('send_batch', campaign_id=campaign_id) }}" class="inline">
      <input name="limit" type="number" min="1" value="10">
      <button class="button" type="submit">Send pending</button>
    </form>
  </div>
  <div class="filters">
    <a href="{{ url_for('campaign_detail', campaign_id=campaign_id) }}">All</a>
    <a href="{{ url_for('campaign_detail', campaign_id=campaign_id, status='pending') }}">Pending</a>
    <a href="{{ url_for('campaign_detail', campaign_id=campaign_id, status='sent') }}">Sent</a>
    <a href="{{ url_for('campaign_detail', campaign_id=campaign_id, status='failed') }}">Failed</a>
  </div>
  <div class="table">
    {% for recipient in recipients %}
      <a class="row" href="{{ url_for('recipient_preview', recipient_id=recipient.id) }}">
        <span>{{ recipient.email }}</span>
        <span class="pill {{ recipient.status }}">{{ recipient.status }}</span>
        <span>{{ recipient.last_error or "" }}</span>
      </a>
    {% else %}
      <p>No recipients match.</p>
    {% endfor %}
  </div>
</section>
{% endblock %}
